  <style>
    /* --- CSS Styling --- */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #fff; }

    /* Auth Box */
    .container { background: #ffffff; color: #333; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .url-bar { font-size: 12px; color: #777; text-align: center; margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 8px; }
    .screen { display: none; }
    .screen.active { display: block; }
    h2 { margin-bottom: 20px; color: #333; font-size: 24px; text-align: center; }
    .input-group { margin-bottom: 15px; }
    .email-container { display: flex; gap: 5px; }
    .email-container input { flex: 2; }
    .email-container select { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; background: #f9f9f9; }
    input[type="text"], input[type="password"], input[type="number"], input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
    button { width: 100%; padding: 12px; background: linear-gradient(to right, #0072ff, #00c6ff); border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    button:hover { opacity: 0.9; }
    .links { margin-top: 15px; display: flex; justify-content: space-between; font-size: 13px; }
    .links a { color: #0072ff; text-decoration: none; cursor: pointer; }
    .note { background: #fff3cd; color: #856404; padding: 10px; border-radius: 6px; font-size: 12px; margin-top: 15px; border-left: 4px solid #ffeeba; }

    /* --- MASTER DASHBOARD (WEBSITE OPEN) --- */
    .dashboard-container { background: #0b0f19; color: #fff; width: 100%; max-width: 1200px; padding: 30px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); display: none; }
    .dashboard-container.active { display: block; }
    .top-header { text-align: center; margin-bottom: 30px; position: relative; }
    .top-header h1 { font-size: 40px; background: linear-gradient(45deg, #00f2fe, #4facfe, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
    .logout-btn { background: #ff4757; width: auto; padding: 8px 20px; position: absolute; right: 0; top: 0; margin-top: 0; }
    
    /* Search & Filter Controls */
    .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; background: #141b2d; padding: 20px; border-radius: 12px; border: 1px solid #232d4b; }
    .search-box { width: 100%; padding: 12px 20px; background: #1f2942; border: 1px solid #31426c; border-radius: 8px; color: white; font-size: 16px; outline: none; }
    .search-box:focus { border-color: #00f2fe; }
    .filter-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-btn { background: #1f2942; border: 1px solid #31426c; color: #fff; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.3s; }
    .filter-btn.active, .filter-btn:hover { background: #00f2fe; color: #0b0f19; font-weight: bold; border-color: #00f2fe; }

    /* Grid Layout */
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .platform-card { background: #141b2d; border: 1px solid #1f2a45; border-radius: 10px; padding: 15px; text-align: center; transition: all 0.25s ease; cursor: pointer; display: flex; flex-direction: column; justify-content: center; min-height: 120px; }
    .platform-card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0, 242, 254, 0.2); border-color: #00f2fe; background: #1c263f; }
    .icon { font-size: 32px; margin-bottom: 8px; }

    .platform-card p { font-size: 12px; color: #8fa0dd; text-transform: capitalize; font-weight: bold; }

    // --- SETUP & GENERATE CARDS & BUTTONS ---

    function generateFilterButtons() {
      const categories = ['all', 'shopping', 'entertainment', 'gaming', 'mobile', 'utility', 'news'];
      const container = document.getElementById('filterContainer');
      container.innerHTML = categories.map(cat => 
        `<button class="filter-btn ${cat==='all'?'active':''}" onclick="setCategoryFilter('${cat}', this)">${cat.toUpperCase()}</button>`
      ).join('');
    }

    function renderWebsites() {
      const grid = document.getElementById('websitesGrid');
      const searchVal = document.getElementById('searchBar').value.toLowerCase();
      
      let filtered = websiteDatabase.filter(site => {
        const matchesSearch = site.name.toLowerCase().includes(searchVal);
        const matchesCat = (activeFilter === 'all' || site.cat === activeFilter);
        return matchesSearch && matchesCat;
      });

      grid.innerHTML = filtered.map(site => `
        <div class="platform-card" onclick="window.open('${site.url}', '_blank')">
          <div class="icon">${site.icon}</div>
          <h3>${site.name}</h3>
          <p>${site.cat}</p>
        </div>
      `).join('');
    }

    function filterWebsites() { renderWebsites(); }
    function setCategoryFilter(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = cat;
      renderWebsites();
    }

    // --- AUTH ACTIONS (WITH CHROME MEMORY) ---
    function handleRegister(e) {
      e.preventDefault();
      const uid = document.getElementById('regUid').value;
      const pass = document.getElementById('regPass').value;
      
      // Store temp data until OTP verification
      window.tempUser = { uid, pass };
      navigateTo('registerOtpScreen');
    }

    function handleRegisterOtpSubmit(e) {
      e.preventDefault();
      // Chrome memory me save karna suru
      let db = JSON.parse(localStorage.getItem('usersDatabase'));
      db.push(window.tempUser);
      localStorage.setItem('usersDatabase', JSON.stringify(db)); // Saved Permanently in Chrome!
      
      alert("Account data saved inside Chrome internal memory!");
      openMainWebsite();
    }

    function handleLogin(e) {
      e.preventDefault();
      const uid = document.getElementById('loginUid').value;
      const pass = document.getElementById('loginPass').value;
      
      // Chrome memory se user check karna
      let db = JSON.parse(localStorage.getItem('usersDatabase'));
      let userFound = db.find(u => u.uid === uid && u.pass === pass);
      
      if(userFound || (uid === "admin" && pass === "admin")) { // backup admin log
        openMainWebsite();
      } else {
        alert("Incorrect UID or Password! Chrome memory didn't match.");
      }
    }

    // General Functions
    function navigateTo(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if(id==='forgotOtpScreen') triggerAutoOTP('forgotOtpInput');
      if(id==='registerOtpScreen') triggerAutoOTP('registerOtpInput');
    }

    function openMainWebsite() {
      document.getElementById('authBox').style.display = 'none';
      document.getElementById('mainDashboard').classList.add('active');
    }

    function logout() {
      document.getElementById('mainDashboard').classList.remove('active');
      document.getElementById('authBox').style.display = 'block';
      navigateTo('loginScreen');
    }

    function handleForgot(e) { e.preventDefault(); navigateTo('forgotOtpScreen'); }
    function handleForgotOtpSubmit(e) { e.preventDefault(); openMainWebsite(); }

    function triggerAutoOTP(inputId) {
      const inputField = document.getElementById(inputId);
      inputField.value = "";
      setTimeout(() => {
        if (inputField.closest('.screen').classList.contains('active')) {
          inputField.value = Math.floor(1000 + Math.random() * 9000);
        }
      }, 5000);
    }
  </script>
